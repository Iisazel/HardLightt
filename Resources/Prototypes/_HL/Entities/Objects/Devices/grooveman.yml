- type: entity
  id: VinylPlayerPortable
  name: grooveman
  parent: BaseItem
  description: A miniaturized version of the standard station vinyl players. Developed by LRSI's R&D division.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,1,3
  - type: Sprite
    sprite: _HL/Objects/Devices/grooveman.rsi
    state: empty
  - type: Appearance
  - type: VinylPlayer
  - type: ContainerContainer
    containers:
      vinyl: !type:ContainerSlot
  - type: ItemSlots
    slots:
      vinyl:
        name: vinyl
        whitelist:
          components:
          - Vinyl
  - type: ItemMapper
    containerWhitelist: [vinyl]
    mapLayers:
      playing:
        whitelist:
          components:
          - Vinyl
